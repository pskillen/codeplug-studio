<svg viewBox="0 0 800 450" fill="none" xmlns="http://www.w3.org/2000/svg">
    <!-- Background -->
    <rect width="800" height="450" fill="#0f172a"></rect>

    <!-- Subtle Background Grid (representing zones/channels) -->
    <path
        d="M0 50 H800 M0 100 H800 M0 150 H800 M0 200 H800 M0 250 H800 M0 300 H800 M0 350 H800 M0 400 H800"
        stroke="#1e293b" stroke-width="1"></path>
    <path d="M100 0 V450 M200 0 V450 M300 0 V450 M400 0 V450 M500 0 V450 M600 0 V450 M700 0 V450"
        stroke="#1e293b" stroke-width="1"></path>

    <!-- Floating Data Particles -->
    <circle cx="350" cy="180" r="2" fill="#06b6d4" opacity="0.6"></circle>
    <circle cx="420" cy="260" r="3" fill="#f97316" opacity="0.6"></circle>
    <circle cx="480" cy="190" r="2" fill="#10b981" opacity="0.6"></circle>
    <circle cx="380" cy="220" r="1.5" fill="#3b82f6" opacity="0.6"></circle>

    <!-- Left Element: Large Brackets & RF -->
    <g transform="translate(100, 100) scale(2.5)">
        <path d="M 18 35 L 5 50 L 18 65" stroke="#06b6d4" stroke-width="3" stroke-linecap="round"
            stroke-linejoin="round"></path>
        <path d="M 38 35 L 48 50 L 38 65" stroke="#06b6d4" stroke-width="3" stroke-linecap="round"
            stroke-linejoin="round"></path>
        <path d="M 26.5 65 L 26.5 35" stroke="#f97316" stroke-width="2.5" stroke-linecap="round"></path>
        <circle cx="26.5" cy="24" r="2.5" fill="#f97316"></circle>
    </g>

    <!-- Center: Animated/Dashed Transfer Line -->
    <path d="M 250 225 L 480 225" stroke="#334155" stroke-width="4" stroke-linecap="round"></path>
    <path d="M 280 225 L 450 225" stroke="#60a5fa" stroke-width="4" stroke-linecap="round"
        stroke-dasharray="12 12"></path>
    <path d="M 460 210 L 490 225 L 460 240" stroke="#60a5fa" stroke-width="4" stroke-linecap="round"
        stroke-linejoin="round"></path>

    <!-- Right Element: Large HT Silhouette -->
    <g transform="translate(520, 80) scale(2.5)">
        <rect x="0" y="38" width="40" height="65" rx="5" stroke="#60a5fa" stroke-width="3"
            fill="#1e293b"></rect>
        <path d="M 8 38 L 8 5" stroke="#60a5fa" stroke-width="4" stroke-linecap="round"></path>
        <circle cx="8" cy="2" r="2.5" fill="#60a5fa"></circle>
        <path d="M 28 38 L 28 28" stroke="#60a5fa" stroke-width="6" stroke-linecap="round"></path>

        <!-- Screen glowing with data injection -->
        <rect x="6" y="48" width="28" height="20" rx="3" fill="#10b981"></rect>
        <!-- Screen UI details -->
        <rect x="10" y="52" width="20" height="2" rx="1" fill="#022c22" opacity="0.5"></rect>
        <rect x="10" y="57" width="15" height="2" rx="1" fill="#022c22" opacity="0.5"></rect>
        <rect x="10" y="62" width="18" height="2" rx="1" fill="#022c22" opacity="0.5"></rect>

        <!-- Speaker Grille -->
        <line x1="12" y1="80" x2="28" y2="80" stroke="#334155" stroke-width="2"
            stroke-linecap="round"></line>
        <line x1="12" y1="85" x2="28" y2="85" stroke="#334155" stroke-width="2"
            stroke-linecap="round"></line>
        <line x1="12" y1="90" x2="28" y2="90" stroke="#334155" stroke-width="2"
            stroke-linecap="round"></line>
    </g>

    <!-- Typography Overlay (Bottom Left) -->
    <text x="50" y="400" font-family="system-ui, -apple-system, sans-serif" font-weight="800"
        font-size="42" fill="#ffffff">Codeplug</text>
    <text x="245" y="400" font-family="system-ui, -apple-system, sans-serif" font-weight="400"
        font-size="42" fill="#94a3b8">Studio</text>
</svg>